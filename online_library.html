<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #222;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .section {
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #222;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .document-list {
            list-style: none;
        }

        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .document-item:last-child {
            border-bottom: none;
        }

        .document-info {
            flex: 1;
        }

        .document-name {
            font-size: 15px;
            display: block;
        }

        .document-meta {
            color: #888;
            font-size: 12px;
        }

        .download-btn {
            background-color: #4a90d9;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            background-color: #357abd;
        }

        .remove-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        .remove-btn:hover {
            background-color: #c0392b;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            background-color: #fafafa;
            cursor: pointer;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .upload-text strong {
            color: #4a90d9;
        }

        .file-input {
            display: none;
        }

        .stats {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 14px;
        }

        .success-msg {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .error-msg {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Document Library</h1>
        <p class="subtitle">Download resources and upload new documents</p>

        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="section">
            <div class="section-title">Available Documents</div>
            <ul class="document-list" id="documentList"></ul>
            <div class="stats" id="docStats"></div>
        </div>

        <div class="section">
            <div class="section-title">Upload New Document</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-text">
                    <strong>Click to browse</strong> or drag and drop files here<br>
                    <small>Supported: PDF, DOC, DOCX, TXT (Max 10MB)</small>
                </div>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,.doc,.docx,.txt">
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // Set this to the actual folder where your PDFs are stored
        // For local development: use relative path like './' or './uploads/'
        // For the sandbox: files are at /mnt/agents/upload/
        const FILE_BASE_PATH = './uploads/';

        // Initial 8 PDFs - these MUST exist in the FILE_BASE_PATH folder
        const initialDocuments = [
            { id: 1, name: "1.06-jQuery-Intro.pdf", type: "PDF", size: "1.2 MB" },
            { id: 2, name: "XML Basics.pdf", type: "PDF", size: "856 KB" },
            { id: 3, name: "Web Development Training Notes_ Introduction to Web Development - DEV Community.pdf", type: "PDF", size: "1.5 MB" },
            { id: 4, name: "REAL IFT 302 Notes.pdf", type: "PDF", size: "2.1 MB" },
            { id: 5, name: "Lecture 1-Overview of WAP.pdf", type: "PDF", size: "340 KB" },
            { id: 6, name: "javascript1.pdf", type: "PDF", size: "980 KB" },
            { id: 7, name: "building-modern-web-applications-using-angular.9781785880728.73223.pdf", type: "PDF", size: "3.2 MB" },
            { id: 8, name: "Introduction to MySQL.pdf", type: "PDF", size: "1.8 MB" }
        ];

        // ===== STATE =====
        let documents = JSON.parse(localStorage.getItem('documents')) || initialDocuments;

        // ===== DOM ELEMENTS =====
        const documentList = document.getElementById('documentList');
        const docStats = document.getElementById('docStats');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        // ===== FUNCTIONS =====

        // Show message helper
        function showMessage(text, isError = false) {
            const msg = isError ? errorMsg : successMsg;
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        // ACTUAL DOWNLOAD FUNCTION - Creates a real file download
        async function downloadFile(filename) {
            const fileUrl = FILE_BASE_PATH + encodeURIComponent(filename);
            
            try {
                // Try to fetch the file
                const response = await fetch(fileUrl);
                
                if (!response.ok) {
                    throw new Error(`File not found: ${filename}`);
                }

                // Get the file as a blob
                const blob = await response.blob();
                
                // Create a temporary download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename; // This sets the downloaded filename
                document.body.appendChild(a);
                a.click();
                
                // Clean up
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                showMessage(`Downloaded: ${filename}`);
            } catch (err) {
                console.error('Download error:', err);
                showMessage(`Error: ${err.message}. Make sure the file exists in: ${FILE_BASE_PATH}`, true);
            }
        }

        // Remove document
        function removeDocument(id) {
            documents = documents.filter(doc => doc.id !== id);
            saveDocuments();
            renderDocuments();
            showMessage('Document removed');
        }

        // Save to localStorage
        function saveDocuments() {
            localStorage.setItem('documents', JSON.stringify(documents));
        }

        // Render the document list
        function renderDocuments() {
            documentList.innerHTML = '';
            
            if (documents.length === 0) {
                documentList.innerHTML = '<div class="empty-state">No documents available. Upload some files!</div>';
                docStats.textContent = '';
                return;
            }

            documents.forEach(doc => {
                const li = document.createElement('li');
                li.className = 'document-item';
                li.innerHTML = `
                    <div class="document-info">
                        <span class="document-name">${doc.name}</span>
                        <span class="document-meta">${doc.type} &bull; ${doc.size}</span>
                    </div>
                    <button class="download-btn" onclick="downloadFile('${doc.name.replace(/'/g, "\\'")}')">Download</button>
                    <button class="remove-btn" onclick="removeDocument(${doc.id})">Remove</button>
                `;
                documentList.appendChild(li);
            });

            docStats.textContent = `${documents.length} document${documents.length !== 1 ? 's' : ''} available`;
        }

        // Handle file upload
        function handleFileUpload(file) {
            if (!file) return;

            const allowedExtensions = ['.pdf', '.doc', '.docx', '.txt'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();

            if (!allowedExtensions.includes(fileExtension)) {
                showMessage('Invalid file type. Only PDF, DOC, DOCX, TXT allowed.', true);
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showMessage('File too large. Maximum size is 10MB.', true);
                return;
            }

            let sizeStr;
            if (file.size < 1024) sizeStr = file.size + ' B';
            else if (file.size < 1024 * 1024) sizeStr = (file.size / 1024).toFixed(1) + ' KB';
            else sizeStr = (file.size / (1024 * 1024)).toFixed(1) + ' MB';

            const newDoc = {
                id: Date.now(),
                name: file.name,
                type: fileExtension.toUpperCase().replace('.', ''),
                size: sizeStr
            };

            documents.push(newDoc);
            saveDocuments();
            renderDocuments();
            showMessage(`Uploaded: ${file.name}`);
        }

        // ===== EVENT LISTENERS =====

        uploadArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFileUpload(e.target.files[0]);
            fileInput.value = '';
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#4a90d9';
            uploadArea.style.backgroundColor = '#f0f7ff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#ccc';
            uploadArea.style.backgroundColor = '#fafafa';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
            uploadArea.style.backgroundColor = '#fafafa';
            handleFileUpload(e.dataTransfer.files[0]);
        });

        // ===== INITIAL RENDER =====
        renderDocuments();
    </script>
</body>
</html>
